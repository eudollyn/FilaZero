<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Gestão | FilaZero</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2ecc71; --bg: #f4f7f6; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        .tabs { margin-bottom: 20px; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: none; background: none; font-weight: bold; font-size: 1rem; color: #666; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        
        /* Layout Comum */
        .section { display: none; max-width: 1200px; margin: 0 auto; }
        .section.active { display: block; }
        
        /* Grid de Pedidos */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        /* Tabela de Produtos */
        .admin-box { background: white; padding: 20px; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        input { padding: 8px; border-radius: 6px; border: 1px solid #ddd; }
        .btn-add { background: var(--primary); color: #000; padding: 10px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('pedidos')">📦 Pedidos</button>
        <button class="tab-btn" onclick="switchTab('produtos')">🏷️ Gerenciar Produtos</button>
    </div>

    <div id="section-pedidos" class="section active">
        <div class="grid" id="lista-pedidos"></div>
    </div>

    <div id="section-produtos" class="section">
        <div class="admin-box">
            <h3>Novo Produto</h3>
            <input type="text" id="p-nome" placeholder="Nome (Ex: Heineken)">
            <input type="number" id="p-preco" placeholder="Preço (Ex: 55.00)">
            <button class="btn-add" onclick="addProduto()">Adicionar</button>
            <hr>
            <table>
                <thead><tr><th>Produto</th><th>Preço</th><th>Ações</th></tr></thead>
                <tbody id="lista-produtos-admin"></tbody>
            </table>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('section-' + tab).classList.add('active');
            event.target.classList.add('active');
        }

        // --- LÓGICA DE PRODUTOS ---
        async function loadProdutos() {
            const res = await fetch('http://localhost:3000/produtos');
            const produtos = await res.json();
            document.getElementById('lista-produtos-admin').innerHTML = produtos.map(p => `
                <tr>
                    <td>${p.nome}</td>
                    <td>R$ ${p.preco}</td>
                    <td><button onclick="delProduto(${p.id})" style="color:red; background:none; border:none; cursor:pointer">Excluir</button></td>
                </tr>
            `).join('');
        }

        async function addProduto() {
            const nome = document.getElementById('p-nome').value;
            const preco = document.getElementById('p-preco').value;
            await fetch('http://localhost:3000/produtos', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ nome, preco })
            });
            loadProdutos();
        }

        async function delProduto(id) {
            await fetch(`http://localhost:3000/produtos/${id}`, { method: 'DELETE' });
            loadProdutos();
        }

        // --- LÓGICA DE PEDIDOS (VEM DO ANTERIOR) ---
        async function loadPedidos() {
            const res = await fetch('http://localhost:3000/pedidos');
            const pedidos = await res.json();
            document.getElementById('lista-pedidos').innerHTML = pedidos.reverse().map(p => `
                <div class="card">
                    <b>#${p.id} - ${p.produto}</b><br>
                    <small>${p.nome} - ${p.status}</small><br><br>
                    ${p.status === 'Preparando' ? `<button onclick="marcarPronto(${p.id})">Pronto</button>` : '✅'}
                </div>
            `).join('');
        }

        async function marcarPronto(id) {
            await fetch(`http://localhost:3000/pedidos/${id}`, { method: 'PUT' });
            loadPedidos();
        }

        setInterval(loadPedidos, 3000);
        loadProdutos(); loadPedidos();
    </script>
</body>
</html>
